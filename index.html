<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,700;12..96,800&family=Red+Hat+Text:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-text">
        <h1>Site Dashboard</h1>
        <p class="subtitle">Product metrics at a glance</p>
      </div>
      <button id="toggle-exercises" class="exercise-toggle">Exercises</button>
    </div>
  </header>

  <div class="layout">
    <main>
      <section id="summary" class="summary-cards"></section>
      <section id="controls">
        <input type="text" id="search" placeholder="Search sites..." aria-label="Search sites">
        <select id="filter-product" aria-label="Filter by product">
          <option value="all">All Products</option>
        </select>
        <select id="filter-status" aria-label="Filter by status">
          <option value="all">All Statuses</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="pending">Pending</option>
        </select>
      </section>
      <section id="sites-table">
        <nav id="pagination-top" class="table-pagination-host" aria-label="Table pagination, top"></nav>
        <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="name">
                  <span class="sort-header-text">Site Name</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="owner">
                  <span class="sort-header-text">Owner</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="product">
                  <span class="sort-header-text">Product</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="status">
                  <span class="sort-header-text">Status</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="csat">
                  <span class="sort-header-text">CSAT</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="monthlyRevenue">
                  <span class="sort-header-text">Monthly Revenue</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
              <th scope="col">
                <button type="button" class="sort-header" data-sort="created">
                  <span class="sort-header-text">Created</span>
                  <span class="sort-indicator" aria-hidden="true"></span>
                </button>
              </th>
            </tr>
          </thead>
          <tbody id="sites-body"></tbody>
        </table>
        </div>
        <nav id="pagination-bottom" class="table-pagination-host" aria-label="Table pagination, bottom"></nav>
      </section>
    </main>

    <aside id="exercise-panel" class="exercise-panel" aria-label="Exercises">
      <div id="exercise-list"></div>
    </aside>
  </div>

  <script type="module" src="main.ts"></script>
  <script type="module" src="exercises.ts"></script>
</body>
</html>
